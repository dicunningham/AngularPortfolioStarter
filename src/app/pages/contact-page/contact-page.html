<section id="contact" class="container">
    <div class="section-header">
        <span class="mono-text">04.</span>
        <h2 class="section-title">Get In Touch</h2>
        <div class="section-line"></div>
    </div>

    <div class="bento-card">
        <h3 style="font-size: 1.5rem; margin-bottom: 1rem;">What's Next?</h3>
        <p>
            As I approach the end of my degree at UNO, I am actively seeking full-time software engineering and web development opportunities. Feel free to drop a message!
        </p>
        <form class="contact-form" onsubmit="event.preventDefault(); this.innerHTML='<h3 class=\'gradient-text\' style=\'text-align:center; font-size:1.5rem; margin-top:2rem;\'>Message sent successfully!</h3><p style=\'text-align:center;\'>Thank you for reaching out. I will get back to you soon.</p>';">
            <div class="form-row">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
            </div>
            <input type="text" placeholder="Subject" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit" class="btn btn-primary" style="align-self: center; padding: 1rem 3rem;">Send Message</button>
        </form>
    </div>
</section>
