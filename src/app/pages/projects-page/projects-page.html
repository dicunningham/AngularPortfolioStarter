<section class="container pt-5">
    <div class="section-header pt-4">
        <span class="mono-text">03.</span>
        <h2 class="section-title">Featured Projects</h2>
        <div class="section-line"></div>
    </div>

    <div class="row g-4">
        
        @for (project of projects; track project.name; let idx = $index) {
            <div class="col-12 {{ idx === 0 ? 'col-lg-8' : idx === 1 ? 'col-lg-4' : 'col-lg-6' }}">
                <div class="bento-card project-card h-100">
                    <div class="project-img">
                        <img [src]="project.image" [alt]="project.name" loading="lazy">
                    </div>
                    
                    <div class="project-content">
                        <h3 class="project-title">{{ project.name }}</h3>
                        <p class="project-desc">{{ project.description }}</p>
                        
                        <div class="project-tech">
                            @for (tag of project.tags; track tag) {
                                <span>{{ tag }}</span>
                            }
                        </div>
                        
                        <div class="project-links">
                            @if (project.repoLink) {
                                <a [href]="project.repoLink" target="_blank" [aria-label]="project.name + ' Repository'">
                                    <i class="fab fa-github"></i>
                                </a>
                            }
                            
                            @if (project.demoLink) {
                                <a [href]="project.demoLink" target="_blank" [aria-label]="project.name + ' Live Demo'">
                                    <i class="fas fa-external-link-alt"></i>
                                </a>
                            }
                        </div>
                    </div>
                </div>
            </div>
        }
    
    </div>
</section>
