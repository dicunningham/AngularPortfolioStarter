<section class="container pt-5">
    <div class="section-header pt-4 mb-5">
        <span class="mono-text">02.</span>
        <h2 class="section-title">Technical Skills</h2>
        <div class="section-line"></div>
    </div>

    <p class="mb-5">Technologies & Domains I work with</p>
    
    @for (category of categories; track category.title) {
        
        <h3 class="h5 mb-4 text-white-50">{{ category.title }}</h3>
        
        <div class="d-flex flex-wrap gap-3 mb-5">
            @for (skill of category.skills; track skill.name) {
                <div class="bento-card skill-card">
                    
                    @if (skill.iconClass) {
                        <i class="{{ skill.iconClass }} fa-2xl"></i>
                    }
                    
                    <span>{{ skill.name }}</span>
                </div>
            }
        </div>

    }
</section>
