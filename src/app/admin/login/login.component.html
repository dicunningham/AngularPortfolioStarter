<section class="container pt-5">
  <div class="section-header pt-4">
    <h2 class="section-title">Admin Login</h2>
    <div class="section-line"></div>
  </div>

  <div class="about-bento" style="display: block; max-width: 400px; margin: 0 auto;">
    <div class="bento-card">
      <form [formGroup]="loginForm" (ngSubmit)="handleLogin()">
        
        <div class="form-group mb-4">
          <input type="email" formControlName="email" id="loginEmail" placeholder=" " />
          <label for="loginEmail">Email</label>
        </div>
        
        <div class="form-group mb-4">
          <input type="password" formControlName="password" id="loginPassword" placeholder=" " />
          <label for="loginPassword">Password</label>
        </div>
        
        <button type="submit" class="btn btn-glow w-100 rounded-pill py-2 layout-btn" [disabled]="loading()">
          {{ loading() ? 'AUTHENTICATING...' : 'LOGIN' }}
        </button>
        
      </form>
    </div>
  </div>
</section>
