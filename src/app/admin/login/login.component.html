<div class="container mt-5">
  <div class="card p-4 mx-auto" style="max-width: 400px;">
    <h2 class="mb-3">Admin Login</h2>
    
    <form [formGroup]="loginForm" (ngSubmit)="handleLogin()">
      <div class="mb-3">
        <input formControlName="email" class="form-control" placeholder="Email" />
      </div>
      <div class="mb-3">
        <input formControlName="password" type="password" class="form-control" placeholder="Password" />
      </div>
      
      <button type="submit" class="btn btn-primary w-100" [disabled]="loading()">
        {{ loading() ? 'Logging in...' : 'Login' }}
      </button>
    </form>
  </div>
</div>
